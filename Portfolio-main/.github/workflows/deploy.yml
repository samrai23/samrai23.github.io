name: Deploy Portfolio to GitHub Pages

on:
  # Runs on every push to the main branch
  push:
    branches: [main]
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN permission to push to gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages  # load variables/secrets scoped to this environment

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js (matches the version used locally)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Determine the correct base path:
      #    - User/org pages (repo = owner.github.io) are served at '/'
      #    - Project pages are served at '/<repo-name>/'
      - name: Determine base path
        id: base
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [[ "$REPO" == "$OWNER.github.io" ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO/" >> "$GITHUB_OUTPUT"
          fi

      # 5. Build the site
      #    VITE_BASE_PATH tells Vite to prefix all asset URLs correctly.
      #    VITE_* personal-info variables come from repository secrets
      #    (Settings → Secrets and variables → Actions).
      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
          VITE_NAME:      ${{ vars.VITE_NAME }}
          VITE_TITLE:     ${{ vars.VITE_TITLE }}
          VITE_TAGLINE:   ${{ vars.VITE_TAGLINE }}
          VITE_SUMMARY:   ${{ vars.VITE_SUMMARY }}
          VITE_LOCATION:  ${{ vars.VITE_LOCATION }}
          VITE_EMAIL:     ${{ vars.VITE_EMAIL }}
          VITE_PHONE:     ${{ vars.VITE_PHONE }}
          VITE_LINKEDIN:  ${{ vars.VITE_LINKEDIN }}
          VITE_GITHUB:    ${{ vars.VITE_GITHUB }}
          VITE_FEATURE_FLAGS_URL: ${{ vars.VITE_FEATURE_FLAGS_URL }}
        run: npm run build

      # 6. Deploy the dist/ folder to the gh-pages branch
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Keeps a clean gh-pages branch on every deploy
          force_orphan: true
